name: S&P 500 Double Check Prediction

on:
  schedule:
    - cron: '0 11 * * *'   # 한국 시간 오후 8:00
    - cron: '15 13 * * *'  # 한국 시간 오후 10:15
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3에서 v4로 변경 (경고 해결!)

      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 변경 (경고 해결!)
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Prediction Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_ACTIONS: "true"
        run: python app.py
