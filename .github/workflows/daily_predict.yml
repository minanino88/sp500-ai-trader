name: S&P 500 Midnight Alpha

on:
  schedule:
    - cron: '0 16 * * *'  # 한국 시간 밤 1:00 (16:00 UTC) -> 메인 매수 신호 알람
    - cron: '0 22 * * *'  # 한국 시간 아침 07:00 (22:00 UTC) -> 성적표 자동 정산 (무음)
  workflow_dispatch:      # 언제든 수동으로 눌러볼 수 있는 버튼

permissions:
  contents: write         # 성적표(history.csv) 저장을 위해 꼭 필요

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI Model
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_ACTIONS: "true"
        run: python app.py

      - name: Save History
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add history.csv
          git commit -m "Update history" || echo "No changes"
          git push
