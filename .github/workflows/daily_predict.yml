name: S&P 500 High-Accuracy Prediction

on:
  schedule:
    - cron: '0 11 * * *'  # 저녁 8:00 (1차 신호)
    - cron: '0 15 * * *'  # 밤 12:00 (최종 확정 - 정합성 최고 시간대)
    - cron: '0 22 * * *'  # 다음날 아침 7:00 (성적표 정산)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_ACTIONS: "true"
        run: python app.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add history.csv
          git commit -m "Update accuracy history" || echo "No changes"
          git push
