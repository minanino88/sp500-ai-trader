name: SP500 Trend Following Bot

on:
  schedule:
    - cron: '0 11 * * 1-5'  # KST 20:00
    - cron: '0 22 * * 1-5'  # KST 07:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 필요한 모든 라이브러리를 한꺼번에 설치합니다.
          pip install yfinance pandas numpy requests pytz python-telegram-bot streamlit plotly

      - name: Run Trading Bot
        env:
          KIS_APPKEY: ${{ secrets.KIS_APPKEY }}
          KIS_SECRET: ${{ secrets.KIS_SECRET }}
          KIS_CANO: ${{ secrets.KIS_CANO }}
          KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_ACTIONS: "true"
        run: python app.py

      - name: Save Trade History & State
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add history_trend.csv trend_state.json || echo "No files to add"
          git commit -m "Update trade history and trend state" || echo "No changes to commit"
          git push
